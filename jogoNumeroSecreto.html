<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Jogos - Memória</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Cores customizadas para simular o seu código original */
        :root {
            --accent: #0ea5e9;
            --primary: #1e293b;
        }
        .bg-accent-10 { background-color: rgba(14, 165, 233, 0.1); }
        .text-accent { color: var(--accent); }
        .bg-primary { background-color: var(--primary); }
    </style>
</head>
<body class="bg-orange-50 min-h-screen">

    <section class="py-16 md:py-24">
        <div class="container mx-auto px-4 max-w-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 rounded-full bg-accent-10 flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="gamepad-2" class="text-accent w-8 h-8"></i>
                </div>
                <h1 class="text-3xl md:text-4xl font-bold mb-2">Mini Jogos</h1>
                <p class="text-gray-600 text-lg">Jogo da Memória — encontre todos os pares!</p>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                <div class="flex justify-between items-center mb-6">
                    <span id="moves-count" class="text-lg font-semibold">Jogadas: 0</span>
                    <button onclick="resetGame()" class="flex items-center gap-2 text-accent font-semibold hover:underline">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i> Reiniciar
                    </button>
                </div>

                <div id="win-message" class="hidden text-center mb-6 p-4 rounded-xl bg-accent-10">
                    <p class="text-2xl font-bold text-accent" id="win-text"></p>
                </div>

                <div id="game-grid" class="grid grid-cols-4 gap-3">
                    </div>
            </div>
        </div>
    </section>

    <script>
        const emojis = ["🦷", "😁", "🪥", "💉", "❤️", "⭐", "🏥", "👨‍⚕️"];
        let cards = [];
        let flipped = [];
        let matched = [];
        let moves = 0;

        const gridElement = document.getElementById('game-grid');
        const movesElement = document.getElementById('moves-count');
        const winMessage = document.getElementById('win-message');
        const winText = document.getElementById('win-text');

        function shuffleArray(arr) {
            return [...arr].sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const gameCards = [...emojis, ...emojis];
            cards = shuffleArray(gameCards);
            gridElement.innerHTML = '';
            
            cards.forEach((emoji, index) => {
                const button = document.createElement('button');
                button.dataset.index = index;
                button.className = "aspect-square rounded-xl text-3xl md:text-4xl flex items-center justify-center transition-all duration-300 cursor-pointer bg-primary text-white hover:scale-105";
                button.innerText = "?";
                button.onclick = () => handleCardClick(index);
                gridElement.appendChild(button);
            });
        }

        function handleCardClick(index) {
            // Lógica de bloqueio
            if (flipped.length === 2 || flipped.includes(index) || matched.includes(index)) return;

            flipped.push(index);
            renderBoard();

            if (flipped.length === 2) {
                moves++;
                movesElement.innerText = `Jogadas: ${moves}`;

                const [first, second] = flipped;
                if (cards[first] === cards[second]) {
                    matched.push(first, second);
                    flipped = [];
                    checkWin();
                    renderBoard();
                } else {
                    setTimeout(() => {
                        flipped = [];
                        renderBoard();
                    }, 800);
                }
            }
        }

        function renderBoard() {
            const buttons = gridElement.querySelectorAll('button');
            buttons.forEach((btn, i) => {
                const isFlipped = flipped.includes(i) || matched.includes(i);
                
                if (isFlipped) {
                    btn.innerText = cards[i];
                    btn.className = "aspect-square rounded-xl text-3xl md:text-4xl flex items-center justify-center transition-all duration-300 bg-accent-10 text-black scale-95";
                } else {
                    btn.innerText = "?";
                    btn.className = "aspect-square rounded-xl text-3xl md:text-4xl flex items-center justify-center transition-all duration-300 cursor-pointer bg-primary text-white hover:scale-105";
                }
            });
        }

        function checkWin() {
            if (matched.length === cards.length) {
                winText.innerText = `🎉 Parabéns! Você venceu em ${moves} jogadas!`;
                winMessage.classList.remove('hidden');
            }
        }

        function resetGame() {
            moves = 0;
            flipped = [];
            matched = [];
            movesElement.innerText = `Jogadas: 0`;
            winMessage.classList.add('hidden');
            createBoard();
        }

        // Inicialização
        createBoard();
        lucide.createIcons(); // Ativa os ícones do Lucide
    </script>
</body>
</html>
